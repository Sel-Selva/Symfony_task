version: '3.9'

services:
  app:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - ./:/srv/app
    working_dir: /srv/app
    environment:
      APP_ENV: dev
      APP_SECRET: 'SOME_SECRET'
      DATABASE_URL: 'mysql://root:root@db:3306/database?serverVersion=8.0&charset=utf8mb4'
      REDIS_URL: 'redis://redis:6379'
      LOCK_DSN: 'redis://redis:6379'
    depends_on:
      - db
      - redis
    command: php -S 0.0.0.0:8000 -t public public/index.php

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: database
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
